name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build and publish installer
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[build]"

      - name: Run tests
        shell: pwsh
        run: python -m unittest discover -s tests

      - name: Build installer
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\build_installer.ps1

      - name: Read package version
        id: version
        shell: pwsh
        run: |
          $Version = python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])"
          "version=$Version" >> $env:GITHUB_OUTPUT

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: EML Viewer ${{ steps.version.outputs.version }}
          body: |
            Windows installer for EML Viewer ${{ steps.version.outputs.version }}.

            Download `EmlViewerSetup-${{ steps.version.outputs.version }}.exe` and run it to install the app.
          files: installer/EmlViewerSetup-${{ steps.version.outputs.version }}.exe
